<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>awgproxy · sign in</title>
  <style>
    :root {
      --bg: #0f1116; --card: #181b22; --text: #e6e8ed; --muted: #8a93a3;
      --border: #2a2f3a; --accent: #4f8cff; --danger: #ff5a5a;
      --input-bg: #11141a; --input-bg-focus: #131820;
      --focus-ring: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .wrap { min-height: 100%; display: grid; place-items: center; padding: 16px; }
    .card {
      width: min(380px, 100%); background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .brand { color: var(--muted); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
    .hint { color: var(--muted); margin: 0 0 16px; font-size: 13px; }
    form { display: flex; flex-direction: column; gap: 10px; }
    input {
      background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); background: var(--input-bg-focus); }
    button {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .error {
      color: var(--danger); background: rgba(255, 90, 90, 0.08); border: 1px solid rgba(255, 90, 90, 0.3);
      padding: 8px 10px; border-radius: 8px; font-size: 13px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">awgproxy</div>
      <h1 id="title">Sign in</h1>
      <p class="hint" id="hint">Use your router login and password.</p>
      <form id="form" autocomplete="on">
        <input id="user" type="text" placeholder="Login" autocomplete="username" required autofocus>
        <input id="pass" type="password" placeholder="Password" autocomplete="current-password" required>
        <div id="err" class="error hidden"></div>
        <button id="btn" type="submit">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    "use strict";
    const $ = (s) => document.querySelector(s);
    // RU-локализация при необходимости.
    if ((navigator.language || "").toLowerCase().startsWith("ru")) {
      document.documentElement.lang = "ru";
      $("#title").textContent = "Вход";
      $("#hint").textContent = "Войдите логином и паролем от роутера.";
      $("#user").placeholder = "Логин";
      $("#pass").placeholder = "Пароль";
      $("#btn").textContent = "Войти";
    }
    // safeNext — пропускаем только относительные пути (защита от open-redirect).
    function safeNext() {
      const n = new URLSearchParams(location.search).get("next");
      if (n && n.startsWith("/") && !n.startsWith("//")) return n;
      return "/";
    }
    $("#form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = $("#err"), btn = $("#btn");
      err.classList.add("hidden");
      btn.disabled = true;
      try {
        const res = await fetch("api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: $("#user").value.trim(), password: $("#pass").value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        location.replace(safeNext());
      } catch (e2) {
        err.textContent = (document.documentElement.lang === "ru" ? "Ошибка входа: " : "Sign-in failed: ") + e2.message;
        err.classList.remove("hidden");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
